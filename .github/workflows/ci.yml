name: CI - Backend TechCup Fútbol

on:
  push:
    branches:
      - develop
      - main
      - feature/pipelineCI
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  build-and-test:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      SSL_PASSWORD: ${{ secrets.SSL_PASSWORD }}
      DB_USERNAME: ${{ vars.DB_USERNAME }}
      DB_NAME: ${{ vars.DB_NAME }}
      SERVER_HTTP_PORT: ${{ vars.SERVER_HTTP_PORT }}
      DB_URL: jdbc:h2:mem:testdb

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compile project
        run: ./mvnw compile -B --no-transfer-progress

      - name: Run unit tests
        run: ./mvnw test -B --no-transfer-progress

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'
          check_name: 'Unit Test Results'
          comment_mode: always

      - name: SonarCloud static analysis
        run: >
          ./mvnw sonar:sonar
          -B --no-transfer-progress
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package JAR
        run: ./mvnw package -B --no-transfer-progress -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: techcup-backend-${{ github.ref_name }}-run${{ github.run_number }}
          path: target/SFC_TechUp_Futbol-*.jar
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-run${{ github.run_number }}
          path: target/site/jacoco/
          retention-days: 7

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()

    steps:
      - name: Write summary
        run: |
          STATUS="${{ needs.build-and-test.result }}"
          ICON=$( [ "$STATUS" = "success" ] && echo "OK" || echo "FAILED" )

          echo "## TechCup Futbol - CI Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Compilacion       | $ICON $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Pruebas unitarias | $ICON $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Analisis estatico | $ICON $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| JAR generado      | $ICON $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Rama:** \`${{ github.ref_name }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Perfil Spring:** \`docker\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Disparado por:** @${{ github.actor }}  " >> $GITHUB_STEP_SUMMARY
          echo "**Ejecucion numero:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY