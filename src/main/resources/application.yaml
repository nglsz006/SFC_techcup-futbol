spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/techcup_futbol
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8443
  http:
    port: 8080
  ssl:
    enabled: true
    key-store: classpath:ssl/sfc-techcup-keystore.p12
    key-store-password: changeit
    key-store-type: PKCS12
    key-alias: sfc-techcup

app:
  cors:
    allowed-origins:
      - https://localhost:3000
